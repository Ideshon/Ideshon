<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stone Scan</title>
  <link rel="stylesheet" href="../style.css">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
</head>
<body class="viewer-page">
  <main class="container">
    <a class="back-link" href="../index.html">← Назад на главную</a>

    <div class="viewer-wrap">
      <h1>Stone Scan</h1>

      <model-viewer
        src="../models/ruins_pre.glb"
        poster="../images/ruins_pre.jpg"
        alt="3D модель Stone Scan"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        loading="eager"
        reveal="auto">
      </model-viewer>

      <div class="description">
        <p><strong>Описание:</strong> тестовая фотограмметрическая модель.</p>
        <p><strong>Формат:</strong> GLB</p>
      </div>
    </div>
  </main>
</body>
</html>
